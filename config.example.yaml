# Example configuration file for Azure Resource Downloader
# Save it anywhere and load it explicitly with --config, e.g.:
#   azure-rd download --config ~/.azure-rd.yaml
# Without --config no config file is read and the built-in defaults apply.

# Azure subscription ID (optional)
# If not specified, the default subscription from 'az login' will be used
# You can override this with the --subscription CLI flag
# subscription: "00000000-0000-0000-0000-000000000000"

# Authentication (optional)
# By default the tool reuses your existing Azure CLI session (run 'az login').
# To download Microsoft Graph/Intune types that need scopes the Azure CLI app
# cannot provide, sign in to a dedicated app registration via the device-code
# flow by setting both client-id and tenant-id.
# Equivalent to the --client-id / --tenant-id flags. Flags override these values.
# client-id: "00000000-0000-0000-0000-000000000000"  # app (client) ID
# tenant-id: "00000000-0000-0000-0000-000000000000"  # Entra tenant ID (required with client-id)

# Output directory for downloaded resources (default: ./output)
# Uncomment to override the default output directory.
# output: "./azure-resources"

# Number of concurrent workers for parallel processing
# Option 1: Use API-specific defaults (RECOMMENDED)
# - Microsoft Graph API: 5 workers (strict rate limits)
# - Azure Resource Manager: 20 workers (generous limits)
# Comment out 'workers' to use automatic API-based defaults
# workers: 5

# Option 2: Set workers globally (overrides API-based defaults)
# Uncomment to use same worker count for all APIs
# workers: 10

# Option 3: Configure workers per API (ADVANCED)
# Fine-tune worker count for each API independently.
# The values below are the built-in defaults; uncomment only to override them.
# workers-by-api:
#   microsoft-graph: 5         # For Microsoft.Graph/* resources (default: 5)
#   azure-resource-manager: 20 # For Microsoft.* ARM resources (default: 20)

# Dry run mode - preview without writing files (default: false)
# dry-run: false

# Timeout in seconds for the download operation (default: 300)
# Equivalent to the --timeout flag. Flag overrides this value.
# timeout: 300

# Resource type filter (optional)
# Restrict the download to one or more registered resource types.
# Equivalent to repeating the --type flag. Flag overrides this value.
# If omitted, all registered resource types are downloaded.
# type:
#   - Microsoft.Resources/resourceGroups
#   - Microsoft.Storage/storageAccounts

# Resource group filter (optional)
# Download the named resource group itself (ARM only).
# Equivalent to the --resource-group flag. Flag overrides this value.
# resource-group: "my-resource-group"

# Resolve masked Intune OMA-URI secrets to plaintext (default: false)
# WARNING: writes decrypted secret values to the output files on disk.
# Requires DeviceManagementConfiguration.ReadWrite.All in the token.
# Equivalent to the --resolve-secrets flag. Flag overrides this value.
# resolve-secrets: false

# Generate documentation prompts (default: false)
# When enabled, the writer creates one dedicated LLM documentation prompt per
# resource type, written as "<type>.prompt.md" inside each resource type's
# output directory (e.g. output/Microsoft.Graph/deviceConfigurations/
# deviceConfigurations.prompt.md). Each prompt is tailored to its resource type
# and asks an LLM to document every setting with best-practice guidance,
# Microsoft Learn links and fully expanded embedded payloads (e.g.
# configurationXml, omaSettings). Paste the prompt together with a resource YAML
# from the same directory into an LLM to generate the documentation.
# Equivalent to the --write-prompts flag. Flag overrides this value.
# write-prompts: true

# Log level - controls verbosity (default: info)
# Options: debug, info, warn, error
# - debug: Maximum verbosity (all messages)
# - info: Normal operation (progress, metrics, warnings, errors)
# - warn: Warnings and errors only
# - error: Errors only
# log-level: "info"

# Note: Terraform import format is now configured per-transformer
# See the terraform-import transformer configuration above

# Transformers (optional)
# List of transformers to apply with their configurations
# Default: all transformers are applied with default settings
#
# Available transformers:
#   - cleaning: Clean properties and apply exclusions
#   - id-resolution: Resolve Azure resource IDs to friendly names  
#   - name-sanitization: Sanitize resource names for files/Terraform
#   - terraform-import: Generate Terraform import blocks
#   - base64-decode: Decode a base64 property (e.g. Intune macOS profile payload).
#                    Options:
#                      mode (default: inline)  # inline = replace value in YAML;
#                                              # file = write decoded sidecar file
#                      source-key (default: payload)
#                      filename-key (default: payloadFileName)  # file mode
#                      extension (default: .mobileconfig)       # file mode
#                      remove-source (default: false)           # file mode
#
# Example 1: All transformers with default settings
# transformers:
#   - name: cleaning
#     # No remove-keys specified - only clean-empty: true applies (removes empty values)
#     # To remove Azure metadata, specify remove-keys explicitly
#   - name: id-resolution
#   - name: name-sanitization
#   - name: terraform-import
#
# Example 2: Cleaning transformer with remove-keys, preserve-keys, and replace
# transformers:
#   - name: cleaning
#     remove-keys:                # Keys to remove (replaces old "exclude-keys" name)
#       - provisioningState
#       - etag
#       - systemData
#       - id                      # Remove "id" everywhere recursively
#     remove-keys-by-type:        # Type-specific removals (replaces "exclude-keys-by-type")
#       Microsoft.Resources/resourceGroups:
#         - managedBy
#       Microsoft.Storage/storageAccounts:
#         - primaryEndpoints
#         - secondaryEndpoints
#     preserve-keys:              # Exceptions - preserve these even if in remove-keys
#       - properties.subnet.id    # Keep this specific "id" (even though "id" is in remove-keys)
#       - metadata.id             # Keep this one too
#     replace:                    # Replace complex objects with specific values
#       - from: grantControls.authenticationStrength.displayName
#         to: grantControls.authenticationStrength
#         # Takes displayName value and replaces entire authenticationStrength object with it
#       - from: properties.networkProfile.id
#         to: networkProfileId
#         # Moves nested value to top level with new name
#     clean-empty: true           # Remove keys with empty values (null, [], "", {}). Default: true
#   - name: id-resolution
#   - name: name-sanitization
#   - name: terraform-import
#     target-format: "{resource_type}.{name}"
#
# Example 3: Skip Terraform imports
# transformers:
#   - name: cleaning
#   - name: id-resolution
#   - name: name-sanitization
#
# Example 4: Module-based Terraform imports
# transformers:
#   - name: cleaning
#   - name: id-resolution
#   - name: name-sanitization
#   - name: terraform-import
#     target-format: 'module["{name}"].{resource_type}.this'
#
# Example 5: Simple list format (no custom config)
# transformers:
#   - cleaning
#   - id-resolution
#   - name-sanitization
#   - terraform-import
#
# Example 6: Disable ALL transformers (raw Azure data)
# transformers: []

# Filters (optional)
# Restrict which resources are downloaded per resource type by matching one or
# more properties against a regular expression (Go RE2 syntax).
#
# Structure: filters.<resourceType>.<propertyPath>: <regex>
#   - <resourceType>  matches a registered handler type (case-insensitive)
#   - <propertyPath>  is a dot-separated path into the resource's raw
#                     properties (e.g. displayName or properties.subnet.id)
#   - <regex>         is a Go regular expression matched against the value
#
# A resource is downloaded only when EVERY listed property regex for its type
# matches (logical AND). Resources of types without a filter are unaffected.
# Filters are evaluated after fetch (against the raw Azure properties), so the
# resource is still read from Azure but excluded resources are never written.
#
# Examples:
# filters:
#   # Only export device configurations whose displayName starts with "GBL_"
#   Microsoft.Graph/deviceConfigurations:
#     displayName: "GBL_.*"
#
#   # Combine multiple properties (both must match)
#   Microsoft.Graph/groups:
#     displayName: "^IT-.*"
#     mailEnabled: "true"
#
#   # Anchor a regex for an exact prefix on storage accounts
#   Microsoft.Storage/storageAccounts:
#     name: "^prod"

# Note: Property exclusions are now configured per-transformer
# See the cleaning transformer configuration above

